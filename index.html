<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lack Design - Selection Guide</title>
    <style>
        :root {
            --primary: #EE4423; /* L'orange vif de votre logo */
            --dark-grey: #242424; /* Le gris anthracite de LACK */
            --light-grey: #5A5A5A; /* Le texte secondaire */
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('STYLE_05_ULTRA_PHOTOREAL.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark-grey);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }
        .quiz-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 550px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            box-sizing: border-box;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-container img {
            max-width: 180px;
            height: auto;
        }
        .step { display: none; }
        .step.active { display: block; }
        h2 { 
            margin-top: 0; 
            font-weight: 600; 
            color: var(--dark-grey); 
            font-size: 20px; 
            letter-spacing: -0.3px;
            line-height: 1.4;
            text-align: left;
            margin-bottom: 25px;
        }
        .btn-container { display: flex; flex-direction: column; gap: 14px; }
        
        /* BOUTONS DES QUESTIONS (ORANGE LACK DESIGN) */
        button.choice-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 18px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s ease-in-out;
            font-weight: 600;
            line-height: 1.4;
            box-shadow: 0 4px 10px rgba(238, 68, 35, 0.2);
        }
        button.choice-btn:hover {
            background: #d63615; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(238, 68, 35, 0.35);
        }
        
        /* BOUTON RESTER SUR LE FORMULAIRE FINAL */
        .btn-next {
            background: var(--dark-grey);
            color: #ffffff;
            text-align: center;
            border: none;
            margin-top: 25px;
            font-weight: 600;
            width: 100%;
            letter-spacing: 0.5px;
            padding: 16px;
            font-size: 16px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-next:hover { 
            background: #111111;
            transform: translateY(-1px);
        }
        .price-tag {
            font-size: 46px;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
            letter-spacing: -1px;
        }
        .result-p {
            text-align: left;
            font-size: 15px;
            color: var(--dark-grey);
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
        }
        .input-field {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            background: #ffffff;
        }
        .input-field:focus {
            border-color: var(--primary);
            outline: none;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="logo-container">
        <img src="logo Lack Design Plain.svg" alt="Lack Design Logo">
    </div>

    <div class="step active" id="step1">
        <h2 id="q1-text">...</h2>
        <div class="btn-container">
            <button class="choice-btn" id="q1-optA" onclick="nextStep(2, 'A')">...</button>
            <button class="choice-btn" id="q1-optB" onclick="nextStep(2, 'B')">...</button>
        </div>
    </div>

    <div class="step" id="step2">
        <h2 id="q2-text">...</h2>
        <div class="btn-container">
            <button class="choice-btn" id="q2-optA" onclick="nextStep(3)">...</button>
            <button class="choice-btn" id="q2-optB" onclick="nextStep(3)">...</button>
            <button class="choice-btn" id="q2-optC" onclick="nextStep(3)">...</button>
        </div>
    </div>

    <div class="step" id="step3">
        <h2 id="r-title" style="text-align: center; color: var(--primary);">...</h2>
        <p id="result-text" class="result-p">...</p>
        <div class="price-tag" id="price-display">...</div>
        <p id="r-inclusion" style="font-size: 14px; color: var(--light-grey); font-weight: 500;">...</p>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">
        
        <form action="mailto:info@lack-design.ch" method="GET" style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
            <label id="form-label" style="font-weight: 500; font-size: 14px; color: var(--light-grey);">...</label>
            <input type="email" name="body" class="input-field" placeholder="votre@adresse.ch" required>
            <button type="submit" class="btn-next" id="form-btn">...</button>
        </form>
    </div>
</div>

<script>
    const translations = {
        fr: {
            q1: "Techniquement, caler un projet de cheminée sur logiciel vous prend déjà des heures. Au moment de présenter le projet au client, quelle est votre situation ?",
            q1A: "J'ai les dessins ou fichiers techniques (DWG, DXF, SKP...), mais pas le temps ou l'envie de gérer la mise en scène et le rendu photoréaliste.",
            q1B: "Je fais encore mes projets et mes présentations à la main, à l'instinct, ou je pars souvent de zéro.",
            q2: "Pour transformer vos concepts en visuels de haut niveau, comment gérez-vous cette charge actuellement ?",
            q2A: "On essaie de le faire en interne, mais cela retire un collaborateur du terrain ou du suivi de chantier.",
            q2B: "On paie des licences ou un dessinateur à l'année, ce qui représente une charge fixe lourde.",
            q2C: "On aimerait le faire, mais on n'a ni les ressources internes ni le temps.",
            rTitle: "Votre solution Lack Design",
            rInclusion: "Inclus : 3 vues photoréalistes, présentation aux couleurs de votre entreprise, PDF prêt à envoyer, 2 phases de modification.",
            formLabel: "Entrez votre adresse e-mail pour recevoir cette proposition par écrit ou planifier un premier test :",
            formBtn: "Tester le service sur un projet",
            profileA: "Vous possédez déjà la base technique. Lack Design intervient uniquement pour sublimer votre travail : nous prompterons la décoration, les textures et la lumière directement sur vos fichiers existants.",
            profileB: "Vous partez d'un concept ou d'un croquis. Lack Design prend en charge la modélisation complète de l'espace, l'intégration des cotes basiques et la création de l'univers visuel de A à Z."
        },
        de: {
            q1: "Die technische Planung eines Cheminée-Projekts kostet Sie bereits Stunden. Wie präsentieren Sie das Projekt Ihrem Kunden ?",
            q1A: "Ich habe die technischen Zeichnungen (DWG, DXF, SKP...), aber keine Zeit für die fotorealistische Inszenierung.",
            q1B: "Ich zeichne meine Projekte noch von Hand oder fange oft bei Null an.",
            q2: "Wie bewältigen Sie derzeit diesen Aufwand für High-End-Visualisierungen ?",
            q2A: "Wir versuchen es intern zu lösen, aber das zieht Mitarbeiter von der Baustelle ab.",
            q2B: "Wir zahlen teure Software-Lizenzen oder einen internen Zeichner, was hohe Fixkosten verursacht.",
            q2C: "Wir würden es gerne tun, haben aber weder die internen Ressourcen noch die Zeit.",
            rTitle: "Ihre Lack Design Lösung",
            rInclusion: "Inklusive: 3 fotorealistische Ansichten, Präsentation in Ihren Unternehmensfarben, druckfertiges PDF, 2 Änderungsphasen.",
            formLabel: "Geben Sie Ihre E-Mail-Adresse ein, um dieses Angebot schriftlich zu erhalten oder einen Test zu planen:",
            formBtn: "Service an einem Projekt testen",
            profileA: "Sie haben bereits die technische Basis. Lack Design greift ein, um Ihre Arbeit zu veredeln: Wir fügen Dekoration, Texturen und Licht direkt in Ihre Dateien ein.",
            profileB: "Sie gehen von einer Skizze aus. Lack Design übernimmt die komplette Raummodellierung und die Erstellung der visuellen Welt von A bis Z."
        },
        it: {
            q1: "Tecnicamente, pianificare un progetto di camino richiede già ore. Al moment di presentarlo al cliente, qual è la vostra situazione ?",
            q1A: "Ho i disegni o file tecnici (DWG, DXF, SKP...), ma non ho il tempo o la voglia di gestire la messa in scena e il rendering fotorealistico.",
            q1B: "Faccio ancora i miei progetti e le mie presentazioni a mano, d'istinto, o parto spesso da zero.",
            q2: "Per trasformare i vostri concetti in visivi di alto livello, come gestite questo carico attualmente ?",
            q2A: "Proviamo a farlo internamente, ma questo toglie un collaboratore dal campo o dal monitoraggio del cantiere.",
            q2B: "Paghiamo licenze o un disegnatore all'anno, il che rappresenta un pesante costo fisso.",
            q2C: "Vorremmo farlo, ma non abbiamo né le risorse interne né il tempo.",
            rTitle: "La vostra soluzione Lack Design",
            rInclusion: "Incluso: 3 viste fotorealistiche, presentazione con i colori della vostra azienda, PDF pronto da inviare, 2 fasi di modifica.",
            formLabel: "Inserisci la tua e-mail per ricevere questa proposta o pianificare un test:",
            formBtn: "Testare il servizio su un projetto",
            profileA: "Avete già la base tecnica. Lack Design interviene solo per sublimare il vostro lavoro: applicheremo la decorazione, le trame e la luce direttamente sui vostri file esistenti.",
            profileB: "Si parte da un concetto o da uno schizzo. Lack Design si occupa della modellazione completa dello spazio, dell'integrazione delle quote di base e della creazione dell'universo visivo da A a Z."
        }
    };

    let lang = navigator.language || navigator.userLanguage;
    lang = lang.substring(0, 2); 
    if (!translations[lang]) lang = 'fr'; 

    let userProfile = 'A';

    function initQuiz() {
        document.getElementById('q1-text').innerText = translations[lang].q1;
        document.getElementById('q1-optA').innerText = translations[lang].q1A;
        document.getElementById('q1-optB').innerText = translations[lang].q1B;
        
        document.getElementById('q2-text').innerText = translations[lang].q2;
        document.getElementById('q2-optA').innerText = translations[lang].q2A;
        document.getElementById('q2-optB').innerText = translations[lang].q2B;
        document.getElementById('q2-optC').innerText = translations[lang].q2C;
        
        document.getElementById('r-title').innerText = translations[lang].rTitle;
        document.getElementById('r-inclusion').innerText = translations[lang].rInclusion;
        document.getElementById('form-label').innerText = translations[lang].formLabel;
        document.getElementById('form-btn').innerText = translations[lang].formBtn;
    }

    function nextStep(stepNumber, profileValue) {
        if (profileValue) userProfile = profileValue;
        
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step' + stepNumber).classList.add('active');
        
        if (stepNumber === 3) {
            const resultText = document.getElementById('result-text');
            const priceDisplay = document.getElementById('price-display');
            
            if (userProfile === 'A') {
                resultText.innerText = translations[lang].profileA;
                priceDisplay.innerText = "CHF 150.-";
            } else {
                resultText.innerText = translations[lang].profileB;
                priceDisplay.innerText = "CHF 250.-";
            }
        }
    }

    initQuiz();
</script>

</body>
</html>
